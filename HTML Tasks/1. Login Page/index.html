<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup Page</title>
    <style>
        body{
            background-color: aqua;
        }
        .Nav{
            text-align:center;
            font-size:30px;
        }
                        
        .Main-box{
            border:2px;
            height:850px;
            width:fit-content;
            display:flex;
            margin-left: 25%;
            border-radius:25px;
        }
        .login,.signup{
            
            background-color:;
            width:500px;
            height:750px;
        }
        .head-btn{
            margin-top:20px;
            margin-left:165px;
            height:40px;
            width:155px;
            font-size:20px;
            border-radius:30px;
        }
        .login-dp{
            margin-left:147px;
            border-radius: 15px;
        }
        h2{
            text-align:center;
        }
        .login-p,.or-{
            font-size:18px;
            text-align:center;
        }
        .id-box{
            margin-left:122px;
             border-radius:5px;
             height:25px;
             width:250px;


        }
        .pass-box{
            margin-left:122px;
            border-radius:5px;
            height:25px;
            width:250px;

        }
        .rem-btn{
            margin-left:125px;
        }
        
    

        .login-btn{
             margin-top:20px;
            margin-left:122px;
            height:40px;
            width:250px;
            font-size:20px;
            border-radius:30px;

        }
        .other{
            margin-left:212px;
            
        }

        .signup-dp{
            margin-left:147px;
            border-radius: 15px;
        }
        
    
            
        
        

    </style>
    
</head>
<body>
    <Nav class="Nav">Login Page | Signup Page</Nav>
    <br>
    <br>
    <div class="Main-box" style="background-color:white;">
        <!--Login Page-->
        <div class="login">
            
            <button class="head-btn">Login</button>
            
            <hr>
            <br>

            <img src="/Login Page/Assets/boy_dp.png" class="login-dp" height="200px" width="200px"> 
            <br/>

            <h2>Welcome Back !!</h2>
            <p class="login-p">Login to continue</p>
            <br>

            <i class="fa-solid fa-user"></i><input type="text" placeholder=" Email or Username " class="id-box">
            <br/>
            <br>
            
            <input type="password" placeholder=" Password " class="pass-box">
            <br/>
            <br/>

            <input type="radio" class="rem-btn"><label>Remember me</label>   |   <label>Forget Password ?</label>

            <br/>

            <button class="login-btn">Login</button>

            <br/>
           
            

            <div>
                <p class="or-">--------------------or-------------------</p>
            </div>

            <div>
                <img src="/Login Page/Assets/google.png" height="25px" class="other">                    
                <img src="/Login Page/Assets/facebook.png" height="25px">
                <img src="/Login Page/Assets/github.png" height="25px" >
            </div>
            



        

        </div>
        
        <hr>



        <!--Signup Page-->

        <div class="signup">
            
            <button class="head-btn">Sign Up</button>
            
            <hr>
            <br>

            <img src="/Login Page/Assets/girl_dp.jfif" class="signup-dp" height="200px" width="200px"> 
            <br/>

            <h2>Create Account</h2>
            <p class="login-p">Sign Up to get Started</p>
            <br>

            <input type="text" placeholder=" Full Name " class="id-box">
            <br/>
            <br>

            <input type="email" placeholder=" Email " class="id-box">

            <br/>
            <br>

            <input type="number" placeholder=" Mobile NO. " class="id-box">

            <br/>
            <br>
            
            <input type="password" placeholder=" Password " class="pass-box">
            <br/>
            <br/>

            <input type="password" placeholder=" Confirm Password " class="pass-box">

            <br/>
            <br/>


            <input type="radio" class="rem-btn"><label>I agree to the Terms and Conditions</label>

            <br/>

            <button class="login-btn">Sign Up</button>

            <br/>
           
            

            <div>
                <p class="or-">Already have an account? Login</p>
            </div>

        </div>
        


    </div>

    
</body>
</html>
