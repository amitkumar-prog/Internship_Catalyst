<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login & Signup Page</title>
       
</head>
<body>
    <Nav class="Nav">✨Login Page & Signup Page✨</Nav>
    <br>
    <br>
    <div class="Main-box" style="background-color:white;">
        <!--Login Page-->
        <div class="login">
            
            <button class="head-btn">Login</button>
            
            <hr>
            <br>

            <img src="/Assets/boy_dp.png" class="login-dp" height="250px" width="250px"> 
            <br/>

            <h2>Welcome Back !!</h2>
            <p class="login-p">Login to continue</p>
            <br>

            <i class="fa-solid fa-user"></i><input type="text" placeholder=" Email or Username " class="id-box">
            <br/>
            <br>
            
            <input type="password" placeholder=" Password " class="pass-box">
            <br/>
            <br/>

            <input type="radio" class="rem-btn"><label>Remember me</label>   |   <label>Forget Password ?</label>

            <br/>

            <button class="login-btn">Login</button>

            <br/>
           
            

            <div>
                <p class="or-">--------------------or-------------------</p>
            </div>

            <div>
                <img src="/Assets/google.png" height="25px" class="other">                    
                <img src="/Assets/facebook.png" height="25px">
                <img src="/Assets/github.png" height="25px" >
            </div>
            



        

        </div>
        
        <hr>



        <!--Signup Page-->

        <div class="signup">
            
            <button class="head-btn">Sign Up</button>
            
            <hr>
            <br>

            <img src="/Assets/girl_dp.jfif" class="signup-dp" height="200px" width="200px"> 
            <br/>

            <h2>Create Account</h2>
            <p class="login-p">Sign Up to get Started</p>
            <br>

            <input type="text" placeholder=" Full Name " class="id-box">
            <br/>
            <br>

            <input type="email" placeholder=" Email " class="id-box">

            <br/>
            <br>

            <input type="number" placeholder=" Mobile NO. " class="id-box">

            <br/>
            <br>
            
            <input type="password" placeholder=" Password " class="pass-box">
            <br/>
            <br/>

            <input type="password" placeholder=" Confirm Password " class="pass-box">

            <br/>
            <br/>


            <input type="radio" class="rem-btn"><label>I agree to the Terms and Conditions</label>

            <br/>

            <button class="login-btn">Sign Up</button>

            <br/>
           
            

            <div>
                <p class="or-">Already have an account? Login</p>
            </div>

        </div>
        


    </div>

    
</body>
</html>
